name: "CI"

on:
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  linux_tests:
    name: "Linux, Ruby ${{ matrix.ruby }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.2'
          - '3.4'
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Ruby ${{ matrix.ruby }}"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: "Run tests and self-lint"
        run: bundle exec rake

  windows_tests:
    name: "Windows, Ruby ${{ matrix.ruby }}"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.2'
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Ruby ${{ matrix.ruby }}"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: "Run tests and self-lint"
        run: bundle exec rake

  baseline:
    name: "Baseline corpus (zero false positives)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Ruby 3.4"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: "Run baseline validation"
        run: bundle exec rake baseline
